<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estudiá con IA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📚 Estudiá con IA</h1>

    <div id="lista-materias"></div>

    <button id="btn-nueva" onclick="abrirPopupNombre()">+ Nueva materia</button>
  </div>

  <!-- POPUP 1: nombre y texto -->
  <div id="overlay-crear" class="overlay oculto">
    <div class="popup">
      <h2>Nueva materia</h2>
      <input type="text" id="input-nombre" placeholder="Nombre de la materia" />
      <textarea id="input-texto" placeholder="Pegá el texto a estudiar..."></textarea>
      <div class="popup-botones">
        <button onclick="cerrarPopupCrear()">Cancelar</button>
        <button onclick="procesarTexto()">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- POPUP 2: cantidad de preguntas -->
  <div id="overlay-cantidad" class="overlay oculto">
    <div class="popup popup-chico">
      <h2>¿Cuántas preguntas?</h2>
      <input type="number" id="input-cantidad" value="5" min="1" max="15" />
      <div class="popup-botones">
        <button onclick="cerrarPopupCantidad()">Cancelar</button>
        <button onclick="generarMateria()">Crear</button>
      </div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="overlay-loading" class="overlay oculto">
    <div class="popup popup-chico" style="text-align: center;">
      <p>⏳ Generando preguntas...</p>
    </div>
  </div>

  <script src="Main.js"></script>
</body>
</html>
