<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estudiá con IA</title>
  <link rel="stylesheet" href="Style.css">
</head>
<body>

  <div class="container">
    <h1 class="TituloPrincipal">EduAssist IA</h1>
    <h3 class="SubtituloPrincipal">Estudiá con IA</h3>

    <!-- Contenedor de las materias -->
    <div id="lista-materias"></div>

    <!-- Boton para abrir panel de creacion -->
    <button class="BotonCreacion" id="btn-nuevo">+ Nueva materia</button>
  </div>

  <!-- POPUP nombre y texto -->
  <div id="overlay-crear" class="overlay oculto">
    <div class="popup">
      <h2>Nueva materia</h2>
      <input type="text" id="input-nombre" placeholder="Nombre de la materia" />
      <textarea id="input-texto" placeholder="Pegá el texto a estudiar..."></textarea>
      <div class="popup-botones">
        <button id="BotonCerrarPopup">Cancelar</button>
        <button id="BotonCrearMateria">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- POPUP cantidad de preguntas -->
  <div id="overlay-cantidad" class="overlay oculto">
    <div class="popup popup-chico">
      <h2>¿Cuántas preguntas?</h2>
      <input type="number" id="input-cantidad" value="5"/>
      <div class="popup-botones">
        <button id="BotonCerrarPopupPreguntas" onclick="cerrarPopupCantidad()">Cancelar</button>
        <button id="BotonCrearMateriaFinal" onclick="generarMateria()">Crear</button>
      </div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="overlay-loading" class="overlay oculto">
    <div class="popup-chico" style="text-align: center;">
      <p>⏳ Generando preguntas...</p>
    </div>
  </div>

  <script src="Main.js"></script>
</body>
</html>
