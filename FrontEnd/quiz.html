<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz · EduAssist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Style.css">
</head>
<body>

  <div class="quiz-header">
    <a href="index.html" class="btn-volver">← Volver</a>
    <h2 id="quiz-titulo"></h2>
  </div>

  <!-- LOADING mientras genera nueva prueba -->
  <div id="overlay-loading" class="overlay oculto">
    <div class="popup popup-chico">
      <div class="loading-inner">
        <div class="spinner"></div>
        <p>Generando prueba…</p>
      </div>
    </div>
  </div>

  <div id="quiz-contenido" class="oculto">
    <p id="quiz-info" class="quiz-info"></p>
    <form id="quiz-form"></form>
    <button id="btn-corregir" onclick="corregir()">Ver resultados</button>
    <div id="quiz-resultado" class="oculto resultado-final"></div>
    <button id="btn-nueva-prueba" class="oculto" onclick="nuevaPrueba()">↺ Nueva prueba</button>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
